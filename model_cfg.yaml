DATA:
  root_dir: /geogfs1/groups/hkurs/u3666068mgh/Tallin
  train_split: train
  val_split: val
  test_split: test
  subset_count: 4096
  NPOINT: 4096
  batch_size: 64
  num_workers: 16
  normalize_with_full_cloud: true
  use_building3d_format: false
  use_color: false
  use_intensity: false

OPTIM:
  epochs: 90
  lr: 0.001
  weight_decay: 0.001
  lr_step: 20
  lr_gamma: 0.5

MODEL:
  use_edge: true
  edge_start_epoch: 0
  PointNet2:
    PosRadius: 0.15
    LossWeight:
      cls_weight: 1.0
      reg_weight: 1.0
  ClusterRefineNet:
    ScoreThresh: 0.2
    MatchRadius: 0.5
    Cluster:
      eps: 0.05
      min_pts: 5
    RefineSA:
      Radii: [0.1, 0.2]
      Nsamples: [16, 16]
      MLPs: [[128, 128], [128, 128]]
    LossWeight:
      reg_weight: 1.0
  EdgeAttentionNet:
    LossWeight:
      cls_weight: 1.0
